services:

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: rluser
      POSTGRES_PASSWORD: rlpass
      POSTGRES_DB: rldb
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rluser"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Baseline (Node.js) - Static limits untuk kontrol baseline
  api-baseline:
    build: ./api
    container_name: api-baseline
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    ports:
      - "3000:3000"
    environment:
      DB_HOST: postgres
      DB_USER: rluser
      DB_PASS: rlpass
      DB_NAME: rldb
      SERVICE_NAME: api-baseline
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # API dengan RL Control (Node.js) - Limits dapat diatur oleh agent
  api-rl:
    build: ./api
    container_name: api-rl
    deploy:
      resources:
        limits:
          memory: 512M
    ports:
      - "3002:3000"
    environment:
      DB_HOST: postgres
      DB_USER: rluser
      DB_PASS: rlpass
      DB_NAME: rldb
      SERVICE_NAME: api-rl
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  rl-agent:
    build: ./rl-agent
    container_name: rl-agent
    depends_on:
      - api-rl
      - prometheus
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./rl-agent/q_table.json:/app/q_table.json
      - ./rl-agent/logs:/app/logs
    environment:
      PROM_URL: "http://prometheus:9090/api/v1/query"
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    container_name: cadvisor
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    privileged: true
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    depends_on:
      - cadvisor
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  # K6 Load Testing (dijalankan sesuai kebutuhan, bukan auto-start)
  k6:
    image: grafana/k6:latest
    container_name: k6
    command: run /scripts/spike-test.js
    volumes:
      - ./k6:/scripts
    environment:
      K6_PROMETHEUS_REMOTE_URL: http://prometheus:9090/api/v1/write
      BASELINE_API: api-baseline:3000
      RL_API: api-rl:3000
    depends_on:
      - api-baseline
      - api-rl
      - prometheus
    profiles: ["load-test"]  # --profile=load-test untuk menjalankan

volumes:
  grafana-data:
  prometheus-data:
  postgres-data:
