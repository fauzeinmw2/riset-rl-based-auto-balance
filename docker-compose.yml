version: "3.8"

services:

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: rluser
      POSTGRES_PASSWORD: rlpass
      POSTGRES_DB: rldb
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  api-baseline:
    build: ./api
    container_name: api-baseline
    cpus: 1.0
    mem_limit: 512m
    ports:
      - "3000:3000"
    environment:
      DB_HOST: postgres
      DB_USER: rluser
      DB_PASS: rlpass
      DB_NAME: rldb
      SERVICE_NAME: api-baseline
    depends_on:
      - postgres

  api-rl:
    build: ./api
    container_name: api-rl
    mem_limit: 512m
    ports:
      - "3002:3000"
    environment:
      DB_HOST: postgres
      DB_USER: rluser
      DB_PASS: rlpass
      DB_NAME: rldb
      SERVICE_NAME: api-rl
    depends_on:
      - postgres

  rl-agent:
    build: ./rl-agent
    container_name: rl-agent
    environment:
      SERVICE_NAME: api-rl
      MODEL_PATH: /app/models/sac_resource_controller.zip
      TARGET_CPU_CORE: 0.7
      TARGET_MEM_MB: 80
      CONTROL_INTERVAL_SEC: 10
    depends_on:
      - api-rl
      - prometheus
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./rl-agent/models:/app/models

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    container_name: cadvisor
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    privileged: true

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus:/etc/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    depends_on:
      - cadvisor

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana

volumes:
  grafana-data:
  postgres-data:
